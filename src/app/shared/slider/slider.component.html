<div
  class="slider-container"
  [ngClass]="orientation"
  (pointerdown)="startDrag($event)"
  (pointermove)="drag($event)"
  (pointerup)="stopDrag($event)"
  (pointerleave)="stopDrag($event)"
>
  <div class="slider-track">
    <div class="slider-thumb" [ngStyle]="{
      left: orientation === 'horizontal' ? getHorizontalPosition() : '50%',
      bottom: orientation === 'vertical' ? getVerticalPosition() : '0',
      transform: orientation === 'vertical' ? 'translate(-50%, 50%)' : 'none' }"></div>
  </div>
</div>
