<div class="bg-gray-800 p-4 rounded-xl mt-6">
  <h2 class="text-lg mb-3 text-white">Track Library</h2>

  <div
    class="border-2 border-dashed border-gray-500 rounded-lg p-6 text-center cursor-pointer hover:border-blue-400 transition"
    (drop)="onDrop($event)"
    (dragover)="onDragOver($event)"
    (click)="fileInput.click()"
  >
    <p class="text-gray-300">Drag & drop audio files here or click to upload</p>

    <input
      #fileInput
      type="file"
      accept="audio/*"
      multiple
      class="hidden"
      (change)="onFileSelected($event)"
    />
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-4">
    <div
      *ngFor="let track of tracks"
      class="bg-gray-700 p-2 rounded text-white flex justify-between items-center"
    >
      {{ track.name }}

      <button (click)="playTrack(track)">
        <mat-icon color="primary">{{ !isPlaying ? 'play_arrow' : 'pause' }}</mat-icon>
      </button>
    </div>
  </div>
</div>
