<div
  *ngIf="isPlaying$ | async"
  class="fixed bottom-0 left-0 w-full bg-gray-900 text-white shadow-lg"
>
  <ng-container *ngIf="isLoading$ | async; else playingControls">
    <div class="flex justify-center">
      <div class="animate-pulse text-gray-400 text-sm">Loading track...</div>
    </div>
  </ng-container>

  <ng-template #playingControls>
    <div class="flex items-center justify-between px-4 py-2">
      <div class="flex items-center gap-3 w-1/3">
        <div class="w-10 h-10 bg-gray-700 rounded"></div>
        <div class="flex flex-col">
          <span class="text-sm font-semibold">Track Name</span>
          <span class="text-xs text-gray-400">Artist</span>
        </div>
      </div>

      <div class="flex items-center justify-center gap-4 w-1/3">
        <button class="hover:text-gray-300"><mat-icon>skip_previous</mat-icon></button>
        <button class="text-lg hover:text-gray-300"><mat-icon>play_arrow</mat-icon></button>
        <button class="hover:text-gray-300"><mat-icon>skip_next</mat-icon></button>
      </div>

      <div class="flex items-center justify-end gap-2 w-1/3">
        <span class="text-sm"><mat-icon>volume_up</mat-icon></span>
        <input type="range" class="w-24" />
      </div>
    </div>

    <div class="w-full h-1 bg-gray-700">
      <div class="h-1 bg-green-500" style="width: 30%"></div>
    </div>
  </ng-template>
</div>
