<div *ngIf="(isPlayerReady$ | async)" class="fixed bottom-0 left-0 w-full">
  <div class="flex justify-end">
    <button
      class="bg-gray-800 text-gray-300 hover:text-white px-4 py-2 rounded-t-xl shadow transition-colors duration-200"
      (click)="closePlayer()"
    >
      Close
    </button>
  </div>

  <div class="bg-gray-900 text-white shadow-lg">
    <ng-container *ngIf="isLoading$ | async; else playingControls">
      <div class="flex justify-center">
        <div class="animate-pulse text-gray-400 text-sm">Loading track...</div>
      </div>
    </ng-container>

    <ng-template #playingControls>
      <div class="w-full h-1 bg-gray-700">
        <div class="h-1 bg-[rgba(168,85,247,1)]" [style.width.%]="progress"></div>
      </div>

      <div class="flex items-center justify-between px-4 py-2">
        <div class="flex items-center gap-3 w-2/3 md:w-1/3">
          <div *ngIf="!(trackInfo$ | async)?.coverUrl" class="w-14 md:w-10 h-10 bg-gray-700 rounded flex items-center justify-center">
            <mat-icon>album</mat-icon>
          </div>
          <img
            *ngIf="(trackInfo$ | async)?.coverUrl"
            [src]="(trackInfo$ | async)?.coverUrl"
            alt="Cover"
            class="w-10 h-10 rounded object-cover"
          />
          <div class="flex flex-col">
            <span class="text-sm font-semibold line-clamp-2">
              {{ (trackInfo$ | async)?.title }}
            </span>

            <span class="text-xs text-gray-400 line-clamp-1">
              {{ (trackInfo$ | async)?.artist }}
            </span>
          </div>
        </div>

        <div class="flex items-center justify-center gap-4 w-1/3">
          <button class="hover:text-gray-300"><mat-icon>skip_previous</mat-icon></button>
          <button class="hover:text-gray-300" (click)="togglePlay()">
            <mat-icon>{{ (isPlaying$ | async) ? 'pause' : 'play_arrow' }}</mat-icon>
          </button>
          <button class="hover:text-gray-300"><mat-icon>skip_next</mat-icon></button>
        </div>

        <div class="hidden md:flex items-center justify-end gap-2 w-1/3">
          <span class="text-sm"><mat-icon>volume_up</mat-icon></span>
          <!-- <input
            min="0.5"
            max="2"
            step="0.01"
            value="1"
            type="range"
            class="w-24"
            (input)="setVolume($event)"
          /> -->

          <app-slider orientation="horizontal" (valueChange)="setVolume($event)"></app-slider>
        </div>
      </div>
    </ng-template>
  </div>
</div>
