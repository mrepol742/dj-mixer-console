<div class="block md:grid md:grid-cols-[1fr_auto_2fr_auto_1fr] gap-4">
  <app-deck-a #deckRefA class="w-full"></app-deck-a>

  <app-divider
    color="rgba(255,0,255,0.3)"
    thickness="3px"
    class="w-full md:w-auto">
  </app-divider>

  <div class="flex flex-col items-center p-4 space-y-6 w-full">
    <div class="flex flex-row justify-center space-x-8">
      <app-slider orientation="vertical" (valueChange)="setCrossfader($event)"></app-slider>
      <app-slider orientation="vertical" (valueChange)="setMasterVolumne($event)"></app-slider>
      <app-slider orientation="vertical" (valueChange)="setTempo($event)"></app-slider>
    </div>

    <div class="w-full mt-4 flex justify-between">
      <app-knob label="Low" (valueChange)="setLow($event)"></app-knob>
      <app-knob label="Mid" (valueChange)="setMid($event)"></app-knob>
      <app-knob label="High" (valueChange)="setHigh($event)"></app-knob>
    </div>
  </div>

  <app-divider
    color="rgba(255,0,255,0.3)"
    thickness="3px"
    class="w-full md:w-auto">
  </app-divider>

  <app-deck-b #deckRefB class="w-full"></app-deck-b>
</div>
