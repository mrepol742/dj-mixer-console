<div
  class="p-6 space-y-4"
  (drop)="onDrop($event)"
  (dragover)="onDragOver($event)"
>
  <div class="mb-2">
    <app-waveform [containerId]="'waveform-a'"></app-waveform>
  </div>

  <input
    type="file"
    (change)="loadTrack($event)"
    class="hidden mt-2 block w-full text-gray-200 bg-gray-700 border border-gray-600 rounded px-3 py-2 cursor-pointer"
    name="deck-a"
  />

  <div class="flex flex-col justify-center items-center space-y-4">
    <app-slider orientation="horizontal" (valueChange)="setVolume($event)"></app-slider>

    <app-slider orientation="horizontal" (valueChange)="setTempo($event)"></app-slider>
  </div>

  <div class="w-full mt-4">
    <div class="flex justify-between">
    <app-knob
      label="Low" (valueChange)="setLow($event)"
    ></app-knob>

    <app-knob
      label="Mid" (valueChange)="setMid($event)"
    ></app-knob>

    <app-knob
      label="High" (valueChange)="setHigh($event)"
    ></app-knob>
    </div>
  </div>

  <div class="flex justify-center">
    <app-button (clicked)="play()"> <mat-icon color="primary">{{ !isPlaying ? 'play_arrow' : 'pause' }}</mat-icon></app-button>
  </div>
</div>
