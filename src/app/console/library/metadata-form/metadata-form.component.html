<app-dialog class="bg-gray-800">
  <h2 dialog-title>Track Metadata</h2>

  <form class="flex flex-col gap-4">
    <div class="flex flex-col">
      <label for="title" class="text-sm text-gray-400">Title</label>
      <input id="title" type="text" class="p-2 rounded bg-gray-700 text-white" />
    </div>
    <div class="flex flex-col">
      <label for="artist" class="text-sm text-gray-400">Artist</label>
      <input id="artist" type="text" class="p-2 rounded bg-gray-700 text-white" />
    </div>
    <div class="flex flex-col">
      <label for="album" class="text-sm text-gray-400">Album</label>
      <input id="album" type="text" class="p-2 rounded bg-gray-700 text-white" />
    </div>
    <button type="submit" class="bg-blue-500 py-2 rounded text-white">Save</button>
  </form>

  <div dialog-actions>
     <button>Close</button>
   </div>
</app-dialog>
