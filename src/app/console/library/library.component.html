<div class="px-6 mt-6">
  <div
    class="border-2 border-dashed border-violet-600 rounded-lg p-6 text-center cursor-pointer hover:border-blue-400 transition"
    (drop)="onDrop($event)"
    (dragover)="onDragOver($event)"
    (click)="fileInput.click()"
  >
    <p class="text-violet-400">Drag & drop audio files here or click to upload</p>

    <input
      #fileInput
      type="file"
      accept="audio/*"
      multiple
      class="hidden"
      (change)="onFileSelected($event)"
    />
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-2 mt-4">
    <div
      *ngFor="let track of tracks$ | async"
      class="bg-gray-800/50 p-2 rounded text-white hover:bg-gray-600 transition-all flex justify-between items-center"
      draggable="true"
      (dragstart)="onDragStart($event, track)"
      (contextmenu)="onRightClick($event, track)"
      (click)="playTrack(track)"
    >
      <mat-icon>music_note</mat-icon>
      <span class="mx-2 flex-1 truncate justify-start">{{ track.name }}</span>
    </div>

    <div
      *ngIf="contextMenuVisible"
      [style.top.px]="contextMenuPosition.y"
      [style.left.px]="contextMenuPosition.x"
      class="context-menu"
    >
      <button (click)="playTrack(contextMenuTrack)">Play</button>
      <button (click)="addToDeckA(contextMenuTrack)">Add to Deck A</button>
      <button (click)="addToDeckB(contextMenuTrack)">Add to Deck B</button>
      <button (click)="viewMetadata(contextMenuTrack)">View Metadata</button>
      <button (click)="deleteTrack(contextMenuTrack)">Delete</button>
    </div>
  </div>
</div>
