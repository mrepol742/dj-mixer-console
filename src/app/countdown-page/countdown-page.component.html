<main
   class="bg-gray-900 font-sans scroll-snap-y scroll-smooth overflow-x-hidden background-grid"
>
   <section
      class="h-screen flex flex-col justify-center items-center text-white snap-start px-3"
   >
      <h1
         class="text-5xl md:text-6xl font-bold mb-6 text-center"
         data-aos="fade-up"
         data-aos-delay="100"
      >
        4.1.2026
      </h1>
      <p
         class="text-gray-300 text-center max-w-xl mb-5 text-lg md:text-xl"
         data-aos="fade-up"
         data-aos-delay="200"
      >
        DJ Remix <span class="gradient-text">Console</span>
      </p>
      <p class="mb-12 text-gray-500"
         data-aos="fade-up"
         data-aos-delay="200">
          Get ready to mix, scratch, and drop beats like never before!
      <div
         class="w-72 md:w-96 p-4 rounded-2xl border border-white/20 backdrop-blur-md shadow-lg flex flex-col gap-4"
         data-aos="fade-up"
         data-aos-delay="300"
      >
         <div class="flex justify-between items-center">
            <span class="font-bold" data-aos="fade-up" data-aos-delay="100"
               >Mini Console</span
            >
            <button
               class="text-white/50 hover:text-white"
               data-aos="fade-up"
               data-aos-delay="100"
            >
               <mat-icon>close</mat-icon>
            </button>
         </div>
         <div class="flex gap-2">
            <button
               class="bg-white/20 hover:bg-white/40 rounded px-3 py-1 transition"
               data-aos="fade-up"
               data-aos-delay="100"
            >
               <mat-icon>play_arrow</mat-icon>
            </button>
            <button
               class="bg-white/20 hover:bg-white/40 rounded px-3 py-1 transition"
               data-aos="fade-up"
               data-aos-delay="100"
            >
               <mat-icon>pause</mat-icon>
            </button>
            <button
               class="bg-white/20 hover:bg-white/40 rounded px-3 py-1 transition"
               data-aos="fade-up"
               data-aos-delay="100"
            >
               <mat-icon>stop</mat-icon>
            </button>
            <button
               class="bg-white/20 hover:bg-white/40 rounded px-3 py-1 transition"
               data-aos="fade-up"
               data-aos-delay="100"
            >
               <mat-icon>skip_previous</mat-icon>
            </button>
         </div>
         <input
            type="range"
            min="0"
            max="100"
            class="w-full accent-white"
            data-aos="fade-up"
            data-aos-delay="100"
         />
      </div>
   </section>
</main>
