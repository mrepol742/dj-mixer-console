[build]
  command = "echo 'NODE_ENV=production' > .env && node env.js && ng build"
  publish = "dist/dj-mixer/browser"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/*.js"
  to = "/:splat.js"
  status = 200

[[redirects]]
  from = "/*.css"
  to = "/:splat.css"
  status = 200

[[redirects]]
  from = "/ssr/*"
  to = "/.netlify/functions/angular"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
